name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target (production)'
        required: false
        default: 'production'

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node setup (frontend build) ───────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Install frontend dependencies ─────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps
        working-directory: ./frontend

      # ── 3.5 Rasterize OG image (SVG -> PNG) ─────────────────────────────────
      # Uses rsvg-convert (librsvg), which renders SVG reliably on the runner.
      # ImageMagick's `convert` was blocked by its SVG security policy, which
      # failed the whole deploy. continue-on-error guarantees a bad OG image
      # can never break a deploy again.
      - name: Generate og-image.png from SVG
        continue-on-error: true
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq librsvg2-bin
          if [ -f og-image.svg ]; then
            rsvg-convert -w 1200 -h 630 og-image.svg -o og-image.png
            echo "Generated og-image.png ($(du -h og-image.png | cut -f1))"
          else
            echo "og-image.svg not found, skipping PNG generation"
          fi
        working-directory: ./frontend/public

      # ── 4. Build React app ───────────────────────────────────────────────────
      - name: Build frontend
        run: npm run build
        working-directory: ./frontend
        env:
          # Silence CRA's "treat warnings as errors" behavior in CI
          CI: false

      # ── 5. Python setup (backend validation) ─────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python3.12 -m venv venv
          venv/bin/pip install -r requirements.txt
        working-directory: ./backend

      # ── 6. Basic backend syntax check ────────────────────────────────────────
      - name: Check Python syntax
        run: venv/bin/python -m py_compile main.py api.py models.py firestore_db.py auth.py
        working-directory: ./backend

      # ── 6.5 Financial-math unit tests ────────────────────────────────────────
      # Pure, deterministic tests (no network, no Firestore) covering the tax
      # engine, net-worth/asset valuation, FIFO realized gains, tax-loss harvest,
      # and the health score. A regression here = wrong financial numbers shown
      # to users, so a failure must BLOCK the deploy.
      - name: Run backend unit tests
        run: |
          venv/bin/python test_tax_logic.py
          venv/bin/python test_calculations.py
          venv/bin/python test_realized_gains.py
          venv/bin/python test_tax_loss.py
          venv/bin/python test_health_score.py
        working-directory: ./backend

      # ── 7. Deploy to Firebase (hosting + functions) ──────────────────────────
      - name: Deploy to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/gcp_key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_key.json
          npx firebase-tools@latest deploy --only hosting,functions --project personal-finance-app-18cbc
        working-directory: .
