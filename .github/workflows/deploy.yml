name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target (production)'
        required: false
        default: 'production'

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node setup (frontend build) ───────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Install frontend dependencies ─────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps
        working-directory: ./frontend

      # ── 4. Build React app ───────────────────────────────────────────────────
      - name: Build frontend
        run: npm run build
        working-directory: ./frontend
        env:
          # Silence CRA's "treat warnings as errors" behavior in CI
          CI: false

      # ── 5. Python setup (backend validation) ─────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: ./backend

      # ── 6. Basic backend syntax check ────────────────────────────────────────
      - name: Check Python syntax
        run: python -m py_compile main.py api.py models.py firestore_db.py auth.py
        working-directory: ./backend

      # ── 7. Deploy to Firebase (hosting + functions + firestore rules) ─────────
      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting,functions,firestore:rules
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: personal-finance-app-18cbc
