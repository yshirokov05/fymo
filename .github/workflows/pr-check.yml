name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node setup ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Install & build frontend ──────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps
        working-directory: ./frontend

      - name: Build frontend (dry run — no deploy)
        run: npm run build
        working-directory: ./frontend
        env:
          CI: false

      # ── 4. Python setup ──────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: ./backend

      # ── 5. Backend syntax check ──────────────────────────────────────────────
      - name: Check Python syntax
        run: python -m py_compile main.py api.py models.py firestore_db.py auth.py
        working-directory: ./backend

      # ── 6. Run backend tests (if any exist) ──────────────────────────────────
      - name: Run backend tests
        run: |
          if [ -f test_tax_logic.py ]; then
            pip install pytest -q
            python -m pytest test_tax_logic.py -v
          else
            echo "No backend tests found — skipping"
          fi
        working-directory: ./backend
